<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mushaffar Settings</title>
  <style>
    :root {
      --primary: #4895EF;
      --bg: #0F1117;
      --bg-card: #1A1D27;
      --bg-input: #252833;
      --text: #EAEDF3;
      --text-secondary: #8E95A5;
      --border: #2A2D3A;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F5F7FA; --bg-card: #FFFFFF; --bg-input: #EDF0F5;
        --text: #1A1D27; --text-secondary: #6B7280; --border: #E2E5EB;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px;
      max-width: 500px;
      margin: 0 auto;
    }
    h1 { font-size: 24px; margin-bottom: 24px; color: var(--primary); }
    .setting {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .setting label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px;
    }
    .setting input[type="number"] {
      width: 60px; padding: 6px 8px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: 14px; text-align: center;
    }
    .setting-desc {
      font-size: 12px; color: var(--text-secondary); margin-top: 6px;
    }
    .btn { padding: 10px 20px; background: var(--primary); color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 16px; }
    .btn:hover { opacity: 0.9; }
    .saved { color: #4CAF50; font-size: 13px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>Mushaffar Settings</h1>

  <div class="setting">
    <label>
      <span>Auto-lock after (minutes)</span>
      <input type="number" id="auto-lock-minutes" min="1" max="60" value="5">
    </label>
    <div class="setting-desc">Vault will lock automatically after this period of inactivity</div>
  </div>

  <div class="setting">
    <label>
      <span>Show auto-fill dropdown</span>
      <input type="checkbox" id="show-autofill" checked>
    </label>
    <div class="setting-desc">Show password suggestions when focusing login forms</div>
  </div>

  <div class="setting">
    <label>
      <span>Save password prompts</span>
      <input type="checkbox" id="save-prompts" checked>
    </label>
    <div class="setting-desc">Ask to save new passwords after login</div>
  </div>

  <button class="btn" id="save-btn">Save Settings</button>
  <span class="saved" id="saved-msg" style="display: none;">Saved!</span>

  <script src="options.ts" type="module"></script>
</body>
</html>
