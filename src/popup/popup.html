<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Mushaffar</title>
</head>
<body>
  <div id="app">
    <!-- Lock Screen -->
    <div id="lock-screen" class="screen active">
      <div class="lock-header">
        <img src="/assets/icons/icon-48.png" alt="Mushaffar" class="logo">
        <h1>Mushaffar</h1>
        <p class="subtitle" data-i18n="unlockSubtitle">Enter your master password to unlock</p>
      </div>
      <form id="unlock-form">
        <div class="input-group">
          <input type="password" id="master-password" placeholder="Master Password" autocomplete="off" autofocus>
          <button type="button" id="toggle-password" class="icon-btn" title="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button type="submit" id="unlock-btn" class="btn-primary" data-i18n="unlock">Unlock</button>
        <p id="unlock-error" class="error hidden"></p>
      </form>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
      <!-- Header -->
      <div class="main-header">
        <div class="header-left">
          <img src="/assets/icons/icon-48.png" alt="" class="logo-small">
          <span class="user-email" id="user-email"></span>
        </div>
        <div class="header-actions">
          <button id="sync-btn" class="icon-btn" title="Sync">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
          <button id="lock-btn" class="icon-btn" title="Lock">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="passwords" data-i18n="passwords">Passwords</button>
        <button class="tab" data-tab="cards" data-i18n="cards">Cards</button>
        <button class="tab" data-tab="authenticator" data-i18n="authenticator">2FA</button>
        <button class="tab" data-tab="generator" data-i18n="generator">Generator</button>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search..." data-i18n-placeholder="searchPlaceholder">
      </div>

      <!-- Passwords Tab -->
      <div id="tab-passwords" class="tab-content active">
        <div id="password-list" class="item-list"></div>
        <div id="no-passwords" class="empty-state hidden">
          <p data-i18n="noPasswords">No passwords found</p>
        </div>
      </div>

      <!-- Cards Tab -->
      <div id="tab-cards" class="tab-content">
        <div id="card-list" class="item-list"></div>
        <div id="no-cards" class="empty-state hidden">
          <p data-i18n="noCards">No cards found</p>
        </div>
      </div>

      <!-- Authenticator Tab -->
      <div id="tab-authenticator" class="tab-content">
        <div id="authenticator-list" class="item-list"></div>
        <div id="no-authenticators" class="empty-state hidden">
          <p data-i18n="noAuthenticators">No 2FA codes found</p>
        </div>
      </div>

      <!-- Generator Tab -->
      <div id="tab-generator" class="tab-content">
        <div class="generator-section">
          <div class="generated-password-box">
            <span id="generated-password" class="generated-text">••••••••••••</span>
            <button id="copy-generated" class="icon-btn" title="Copy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
          <div class="generator-controls">
            <label>
              <span data-i18n="lengthLabel">Length</span>: <span id="length-value">16</span>
              <input type="range" id="gen-length" min="6" max="32" value="16">
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="gen-uppercase" checked>
              <span data-i18n="uppercaseLetters">Uppercase (A-Z)</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="gen-lowercase" checked>
              <span data-i18n="lowercaseLetters">Lowercase (a-z)</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="gen-numbers" checked>
              <span data-i18n="numbers">Numbers (0-9)</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="gen-symbols" checked>
              <span data-i18n="symbols">Symbols (!@#$...)</span>
            </label>
          </div>
          <button id="regenerate-btn" class="btn-primary" data-i18n="generateNew">Generate New</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
