<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Mushaffar</title>
</head>
<body>
  <div id="app">
    <!-- Setup Screen (first-time only) -->
    <div id="setup-screen" class="screen">
      <div class="popup-header-centered">
        <img src="/assets/icons/icon-48.png" alt="Mushaffar" class="logo">
        <h1>Mushaffar</h1>
        <p class="subtitle">Set up your password vault</p>
      </div>

      <div id="setup-choice" class="popup-body">
        <button id="setup-fresh-btn" class="btn-primary">Create New Vault</button>
        <button id="setup-import-btn" class="btn-secondary">Import from App</button>
      </div>

      <div id="setup-fresh" class="popup-body hidden">
        <form id="setup-form">
          <div class="input-group">
            <input type="password" id="setup-password" placeholder="Create master password" autocomplete="off">
          </div>
          <div class="input-group">
            <input type="password" id="setup-confirm" placeholder="Confirm password" autocomplete="off">
          </div>
          <p class="hint">Minimum 8 characters</p>
          <button type="submit" class="btn-primary">Create Vault</button>
          <button type="button" id="setup-back-1" class="btn-text">Back</button>
          <p id="setup-error" class="error hidden"></p>
        </form>
      </div>

      <div id="setup-import" class="popup-body hidden">
        <form id="import-form">
          <div class="file-drop-zone" id="file-drop-zone">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p id="file-label">Drop .mushaffar file or click</p>
            <input type="file" id="import-file" accept=".mushaffar" hidden>
          </div>
          <div class="input-group">
            <input type="password" id="import-backup-password" placeholder="Backup password (from app)" autocomplete="off">
          </div>
          <div class="input-group">
            <input type="password" id="import-master-password" placeholder="New master password" autocomplete="off">
          </div>
          <div class="input-group">
            <input type="password" id="import-confirm" placeholder="Confirm master password" autocomplete="off">
          </div>
          <button type="submit" class="btn-primary" id="import-btn">Import &amp; Create Vault</button>
          <button type="button" id="setup-back-2" class="btn-text">Back</button>
          <p id="import-error" class="error hidden"></p>
        </form>
      </div>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="screen">
      <div class="popup-header-centered">
        <img src="/assets/icons/icon-48.png" alt="Mushaffar" class="logo">
        <h1>Mushaffar</h1>
        <p class="subtitle">Enter your master password</p>
      </div>
      <form id="unlock-form" class="popup-body">
        <div class="input-group">
          <input type="password" id="master-password" placeholder="Master Password" autocomplete="off" autofocus>
          <button type="button" id="toggle-password" class="icon-btn" title="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button type="submit" id="unlock-btn" class="btn-primary">Unlock</button>
        <p id="unlock-error" class="error hidden"></p>
      </form>
    </div>

    <!-- Main Screen (minimal — like Google PM) -->
    <div id="main-screen" class="screen">
      <div class="main-header">
        <div class="header-left">
          <img src="/assets/icons/icon-48.png" alt="" class="logo-sm">
          <span class="header-title">Mushaffar</span>
        </div>
        <div class="header-actions">
          <button id="sync-btn" class="icon-btn" title="Sync with Drive" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
          <button id="lock-btn" class="icon-btn" title="Lock">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Credentials for current site -->
      <div id="credentials-section">
        <div id="site-label" class="site-label hidden"></div>
        <div id="credential-list" class="credential-list"></div>
        <div id="no-match-state" class="no-match-state hidden">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <p>No saved passwords for this site</p>
        </div>
        <div id="vault-summary" class="vault-summary hidden"></div>
      </div>

      <!-- Collapsible password generator -->
      <div class="generator-section">
        <button id="generator-toggle" class="section-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/>
          </svg>
          <span>Password Generator</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div id="generator-body" class="generator-body hidden">
          <div class="generated-box">
            <span id="generated-password" class="generated-text">............</span>
            <button id="copy-generated" class="icon-btn" title="Copy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
          <div class="gen-controls">
            <label class="gen-range">Length: <span id="length-value">16</span>
              <input type="range" id="gen-length" min="6" max="32" value="16">
            </label>
            <div class="gen-toggles">
              <label><input type="checkbox" id="gen-uppercase" checked> A-Z</label>
              <label><input type="checkbox" id="gen-lowercase" checked> a-z</label>
              <label><input type="checkbox" id="gen-numbers" checked> 0-9</label>
              <label><input type="checkbox" id="gen-symbols" checked> !@#</label>
            </div>
          </div>
          <button id="regenerate-btn" class="btn-outline">Regenerate</button>
        </div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <button id="open-vault-btn" class="footer-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          </svg>
          Open full vault
        </button>
        <button id="open-settings-btn" class="footer-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          Settings
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
